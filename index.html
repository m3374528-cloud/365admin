<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>365 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f0}
.tab-bar{display:flex;background:#fff;border-bottom:0.5px solid #e0e0d8;position:sticky;top:0;z-index:100}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:11px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:#1D9E75;border-bottom:2px solid #1D9E75}
.page{display:none;padding:12px}
.page.on{display:block}
.section{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:500;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid #eee;display:flex;justify-content:space-between;align-items:center}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit}
.lbl{font-size:12px;color:#888;margin-bottom:4px;margin-top:8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.btn-green{background:#1D9E75;color:#fff}
.btn-blue{background:#185FA5;color:#fff}
.btn-full{width:100%;padding:14px;font-size:14px}
.loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading.show{display:flex}
.loading-text{color:#fff;font-size:15px;font-weight:500}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* 달력 */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{background:none;border:none;font-size:22px;cursor:pointer;color:#1D9E75;padding:4px 12px}
.cal-title{font-size:15px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;color:#888;padding:4px 0;font-weight:500}
.cal-day{min-height:65px;background:#fff;border:0.5px solid #eee;border-radius:6px;padding:4px;cursor:pointer}
.cal-day:hover{background:#f0fbf7}
.cal-day.today{border-color:#1D9E75;border-width:2px}
.cal-day.other{opacity:0.25}
.cal-date{font-size:11px;font-weight:500;margin-bottom:2px}
.cal-item{font-size:9px;padding:2px 3px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.c-red{background:#FCEBEB;color:#A32D2D}
.c-yellow{background:#FEF3E2;color:#C17D20}
.c-green{background:#E1F5EE;color:#0F6E56}
.c-gray{background:#f0f0f0;color:#888}
/* 팝업 */
.popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.popup-overlay.show{display:flex}
.popup-box{background:#fff;border-radius:16px 16px 0 0;padding:1.5rem;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.popup-title{font-size:15px;font-weight:500;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid #eee;display:flex;justify-content:space-between;align-items:center}
.popup-close{background:none;border:none;font-size:22px;color:#888;cursor:pointer;line-height:1}
.rec-card{background:#f9f9f9;border-radius:10px;padding:12px;margin-bottom:10px;border:0.5px solid #eee}
.rec-title{font-size:13px;font-weight:500;margin-bottom:8px;color:#1a1a1a}
.rec-row{display:flex;justify-content:space-between;font-size:12px;color:#555;padding:3px 0;border-bottom:0.5px solid #f0f0f0}
.rec-row:last-of-type{border-bottom:none}
.detail-section{margin-top:8px;padding-top:8px;border-top:0.5px dashed #ddd}
.detail-title{font-size:11px;font-weight:500;color:#888;margin-bottom:4px}
.detail-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:0.5px solid #f5f5f5}
.detail-total{display:flex;justify-content:space-between;font-size:12px;font-weight:500;padding:4px 0;margin-top:2px}
.sbtn-wrap{display:flex;gap:6px;margin-top:10px}
.sbtn{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer}
.sbtn-exp{background:#E1F5EE;color:#0F6E56}
.sbtn-exp.done{background:#1D9E75;color:#fff}
.sbtn-eq{background:#E6F1FB;color:#0C447C}
.sbtn-eq.done{background:#185FA5;color:#fff}
/* 미제출 */
.unsub-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.empty{text-align:center;padding:40px 20px;color:#888;font-size:13px}
/* 대리작성 */
.chip{padding:7px 12px;border-radius:20px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#1a1a1a;white-space:nowrap}
.chip.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
.card-chip{padding:8px 10px;border-radius:8px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;background:#fff;text-align:center}
.card-chip.on{background:#185FA5;border-color:#185FA5;color:#fff}
.add-btn{width:100%;padding:8px;border:0.5px dashed #ccc;border-radius:8px;background:transparent;color:#888;font-size:13px;cursor:pointer;margin-top:8px}
.item-box{border:0.5px solid #eee;border-radius:8px;padding:10px;margin-top:8px;position:relative}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;line-height:1}
.time-row{display:flex;align-items:center;gap:6px}
.time-row span{color:#888;font-size:13px;flex-shrink:0}
.check-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.check-row label{font-size:13px;color:#555;cursor:pointer}
input[type=checkbox]{width:16px!important;height:16px;cursor:pointer;flex-shrink:0}
.complete-box{display:none;background:#E1F5EE;border:0.5px solid #1D9E75;border-radius:12px;padding:1.5rem;margin-bottom:12px;text-align:center}
.complete-box.show{display:block}
.new-btn{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px}
.req{color:#E24B4A;margin-left:2px}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.legend span{font-size:11px;padding:3px 8px;border-radius:6px}
.vat-box{margin-top:8px;padding:10px;background:#f5f5f0;border-radius:8px;display:none;font-size:12px}
.vat-row{display:flex;justify-content:space-between;padding:2px 0}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="ltxt">불러오는 중...</div>
</div>

<div class="tab-bar">
  <div class="tab on" id="tab-cal" onclick="switchTab('cal')">📅 달력</div>
  <div class="tab" id="tab-unsub" onclick="switchTab('unsub')">⚠️ 미제출</div>
  <div class="tab" id="tab-write" onclick="switchTab('write')">✏️ 대리작성</div>
  <div class="tab" id="tab-stat" onclick="switchTab('stat')">📊 현황</div>
</div>

<!-- 달력 -->
<div class="page on" id="page-cal">
  <div style="padding:12px 0 8px;display:flex;justify-content:space-between;align-items:center">
    <p style="font-size:16px;font-weight:500">경비 달력</p>
    <button class="btn btn-green" onclick="loadCal()" style="padding:6px 12px;font-size:12px">새로고침</button>
  </div>
  <div class="section" style="padding:0.8rem">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
      <div class="cal-title" id="cal-title">-</div>
      <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div>
      <div class="cal-dow">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="legend">
    <span class="c-red">🔴 미확인</span>
    <span class="c-yellow">🟡 부분완료</span>
    <span class="c-green">🟢 완료</span>
    <span class="c-gray">⬜ 경비없음</span>
  </div>
</div>

<!-- 미제출 -->
<div class="page" id="page-unsub">
  <div style="padding:12px 0 8px;display:flex;justify-content:space-between;align-items:center">
    <p style="font-size:16px;font-weight:500">⚠️ 미제출 현장</p>
    <button class="btn btn-green" onclick="loadUnsub()" style="padding:6px 12px;font-size:12px">새로고침</button>
  </div>
  <div id="unsub-list"></div>
</div>

<!-- 대리작성 -->
<div class="page" id="page-write">
  <div style="padding:12px 0 4px"><p style="font-size:16px;font-weight:500">✏️ 대리 작성</p></div>
  <div class="complete-box" id="w-done">
    <div style="font-size:18px;font-weight:500;color:#0F6E56;margin-bottom:8px">✅ 제출 완료!</div>
    <div style="font-size:13px;color:#1D9E75" id="w-done-desc"></div>
    <button class="new-btn" onclick="resetWrite()">새로 작성하기</button>
  </div>
  <div id="w-form">
    <div class="section">
      <div class="sec-title">날짜 <span class="req">*</span></div>
      <input type="date" id="w-date">
    </div>
    <div class="section">
      <div class="sec-title">프로젝트 <span class="req">*</span></div>
      <select id="w-proj"><option value="">— 프로젝트 선택 —</option></select>
    </div>
    <div class="section">
      <div class="sec-title">투입 작업자</div>
      <div class="chip-wrap" id="w-workers"></div>
      <div class="lbl">추가 인원</div>
      <input type="text" id="w-extra" placeholder="추가 작업자 이름 (쉼표로 구분)">
    </div>
    <div class="section">
      <div class="sec-title">작업 시간</div>
      <div class="time-row">
        <select id="w-ts" style="flex:1"></select>
        <span>~</span>
        <select id="w-te" style="flex:1"></select>
      </div>
      <div class="check-row" style="margin-top:8px">
        <input type="checkbox" id="w-ot" onchange="document.getElementById('w-ot-wrap').style.display=this.checked?'block':'none'">
        <label for="w-ot">잔업 있음</label>
      </div>
      <div id="w-ot-wrap" style="display:none">
        <div class="time-row">
          <select id="w-ots" style="flex:1"></select>
          <span>~</span>
          <select id="w-ote" style="flex:1"></select>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="sec-title">경비 사용 내역</div>
      <div class="check-row">
        <input type="checkbox" id="w-noexp" onchange="document.getElementById('w-exp-body').style.opacity=this.checked?'0.4':'1';document.getElementById('w-exp-body').style.pointerEvents=this.checked?'none':'auto'">
        <label for="w-noexp">경비 사용 없음</label>
      </div>
      <div id="w-exp-body">
        <div class="lbl">사용 카드</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px" id="w-cards"></div>
        <div class="lbl" style="margin-top:10px">경비 내역</div>
        <div id="w-exp-list"></div>
        <button class="add-btn" onclick="addExp()">+ 경비 항목 추가</button>
      </div>
    </div>
    <div class="section">
      <div class="sec-title">장비 / 외주</div>
      <div id="w-eq-list"></div>
      <button class="add-btn" onclick="addEq()">+ 항목 추가</button>
      <div class="check-row" style="margin-top:8px">
        <input type="checkbox" id="w-noinv">
        <label for="w-noinv">거래명세서 없음</label>
      </div>
    </div>
    <div class="section">
      <div class="sec-title">작성자 <span class="req">*</span></div>
      <input type="text" id="w-writer" placeholder="작성자 이름">
    </div>
    <div style="padding-bottom:30px">
      <button class="btn btn-green btn-full" onclick="submitWrite()">제출하기</button>
    </div>
  </div>
</div>

<!-- 현황 -->
<div class="page" id="page-stat">
  <div style="padding:12px 0 8px;display:flex;justify-content:space-between;align-items:center">
    <p style="font-size:16px;font-weight:500">📊 현황</p>
    <button class="btn btn-green" onclick="loadStat()" style="padding:6px 12px;font-size:12px">새로고침</button>
  </div>
  <div class="section">
    <div class="sec-title">날짜별 조회 <input type="date" id="stat-date" style="width:auto;font-size:12px;padding:4px 8px" onchange="loadDateStat()"></div>
    <div id="date-stat"><p style="font-size:13px;color:#888;padding:8px 0">날짜를 선택하세요</p></div>
  </div>
  <div class="section">
    <div class="sec-title">월별 경비 합계 <input type="month" id="stat-month" style="width:auto;font-size:12px;padding:4px 8px" onchange="loadMonthStat()"></div>
    <div id="month-stat"><p style="font-size:13px;color:#888;padding:8px 0">월을 선택하세요</p></div>
  </div>
</div>

<!-- 팝업 -->
<div class="popup-overlay" id="popup" onclick="if(event.target===this)closePopup()">
  <div class="popup-box">
    <div class="popup-title">
      <span id="popup-ttl"></span>
      <button class="popup-close" onclick="closePopup()">&#215;</button>
    </div>
    <div id="popup-body"></div>
  </div>
</div>

<script>
var SURL='https://script.google.com/macros/s/AKfycbzNI4xmJT7kaA06gosQ2BE6kg8i5i1M-z_4tq3jsr32-nftkN0sH86ox9xEmVo0oe9IoQ/exec';
var MD={projects:[],workers:[],cards:[],expItems:[],equips:[]};
var CY=new Date().getFullYear(), CM=new Date().getMonth();
var CDATA={};
var expC=0, eqC=0;

function showL(t){document.getElementById('ltxt').textContent=t||'처리 중...';document.getElementById('loading').classList.add('show');}
function hideL(){document.getElementById('loading').classList.remove('show');}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('on');});
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('page-'+t).classList.add('on');
}

function fetchJ(url){return fetch(url).then(function(r){return r.json();});}
function postJ(data){return fetch(SURL,{method:'POST',body:JSON.stringify(data)}).then(function(r){return r.json();});}

function pad2(n){return String(n).padStart(2,'0');}
function toDateStr(d){return d.getFullYear()+'.'+pad2(d.getMonth()+1)+'.'+pad2(d.getDate());}
function todayStr(){return toDateStr(new Date());}

// ===== 초기화 =====
async function init(){
  showL('데이터 불러오는 중...');
  try{
    var r=await Promise.all([
      fetchJ(SURL+'?action=getProjects'),
      fetchJ(SURL+'?action=getWorkers'),
      fetchJ(SURL+'?action=getCards'),
      fetchJ(SURL+'?action=getExpenseItems'),
      fetchJ(SURL+'?action=getEquipments')
    ]);
    MD.projects=r[0].data||[];
    MD.workers=r[1].data||[];
    MD.cards=(r[2].data||[]).map(function(c){c.last4=String(c.last4).padStart(4,'0');return c;});
    MD.expItems=r[3].data||[];
    MD.equips=r[4].data||[];
    buildWrite();
  }catch(e){console.error(e);}
  hideL();
  loadCal();
  loadUnsub();
  // 현황 초기값
  var now=new Date();
  document.getElementById('stat-date').value=now.toISOString().split('T')[0];
  document.getElementById('stat-month').value=now.getFullYear()+'-'+pad2(now.getMonth()+1);
}

// ===== 달력 =====
async function loadCal(){
  showL('달력 불러오는 중...');
  try{
    var ms=CY+'.'+pad2(CM+1);
    var res=await fetchJ(SURL+'?action=getMonthRecords&month='+encodeURIComponent(ms));
    CDATA=res.data||{};
  }catch(e){}
  hideL();
  renderCal();
}

function renderCal(){
  document.getElementById('cal-title').textContent=CY+'년 '+(CM+1)+'월';
  var grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  var first=new Date(CY,CM,1).getDay();
  var last=new Date(CY,CM+1,0).getDate();
  var now=new Date();

  for(var i=0;i<first;i++){
    var e=document.createElement('div');e.className='cal-day other';grid.appendChild(e);
  }
  for(var d=1;d<=last;d++){
    var ds=CY+'.'+pad2(CM+1)+'.'+pad2(d);
    var div=document.createElement('div');div.className='cal-day';
    var isToday=(now.getFullYear()===CY&&now.getMonth()===CM&&now.getDate()===d);
    if(isToday)div.classList.add('today');
    var dn=document.createElement('div');dn.className='cal-date';
    dn.style.color=isToday?'#1D9E75':'#1a1a1a';
    dn.textContent=d;div.appendChild(dn);
    var recs=CDATA[ds]||[];
    recs.forEach(function(r){
      var it=document.createElement('div');it.className='cal-item';
      var expOk=r.expenseConfirmed==='Y';
      var eqOk=r.equipConfirmed==='Y';
      var hasEq=r.hasEquip==='Y';
      var noExp=r.noExpense==='Y';
      if(expOk&&(!hasEq||eqOk))it.classList.add('c-green');
      else if(expOk||eqOk)it.classList.add('c-yellow');
      else if(noExp&&!hasEq)it.classList.add('c-gray');
      else it.classList.add('c-red');
      it.textContent=r.projNum;
      div.appendChild(it);
    });
    if(recs.length>0){
      (function(ds2,recs2){div.onclick=function(){showPopup(ds2,recs2);};})(ds,recs);
    }
    grid.appendChild(div);
  }
}

function changeMonth(d){
  CM+=d;
  if(CM>11){CM=0;CY++;}
  if(CM<0){CM=11;CY--;}
  loadCal();
}

async function showPopup(ds,recs){
  document.getElementById('popup-ttl').textContent='📅 '+ds;
  document.getElementById('popup-body').innerHTML='<p style="text-align:center;color:#888;padding:20px">불러오는 중...</p>';
  document.getElementById('popup').classList.add('show');
  var html='';
  for(var i=0;i<recs.length;i++){
    var r=recs[i];
    var expOk=r.expenseConfirmed==='Y';
    var eqOk=r.equipConfirmed==='Y';
    var hasEq=r.hasEquip==='Y';
    var exps=[], eqs=[];
    try{
      var det=await fetchJ(SURL+'?action=getSubmitData&date='+encodeURIComponent(ds)+'&projNum='+encodeURIComponent(r.projNum));
      exps=det.expenses||[];eqs=det.equips||[];
    }catch(e){}
    html+='<div class="rec-card">';
    html+='<div class="rec-title">'+r.projNum+' '+r.projName+'</div>';
    html+='<div class="rec-row"><span>작업자</span><span>'+r.workers+' ('+r.workerCount+'명)</span></div>';
    html+='<div class="rec-row"><span>작업시간</span><span>'+r.timeRange+'</span></div>';
    html+='<div class="rec-row"><span>작성자</span><span>'+r.writer+'</span></div>';
    if(exps.length>0){
      html+='<div class="detail-section"><div class="detail-title">💳 경비 내역</div>';
      var ct=0;
      exps.forEach(function(e){
        ct+=Number(e.amount||0);
        var badge=e.isPersonal?'<span style="font-size:10px;background:#FAEEDA;color:#633806;padding:1px 5px;border-radius:4px">개인</span>':'<span style="font-size:10px;background:#E6F1FB;color:#0C447C;padding:1px 5px;border-radius:4px">법인</span>';
        html+='<div class="detail-row"><span>'+e.item+' '+badge+'</span><span>'+Number(e.amount||0).toLocaleString()+'원</span></div>';
      });
      html+='<div class="detail-total" style="color:#1D9E75"><span>합계</span><span>'+ct.toLocaleString()+'원</span></div></div>';
    } else if(r.noExpense==='Y'){
      html+='<div class="detail-section"><p style="font-size:12px;color:#888">경비 사용 없음</p></div>';
    }
    if(eqs.length>0){
      html+='<div class="detail-section"><div class="detail-title">🚜 장비/외주 내역</div>';
      var et=0;
      eqs.forEach(function(e){
        et+=Number(e.supplyAmt||0);
        html+='<div class="detail-row"><span>'+e.type+(e.company?' / '+e.company:'')+'</span><span>'+Number(e.supplyAmt||0).toLocaleString()+'원</span></div>';
      });
      html+='<div class="detail-total" style="color:#185FA5"><span>합계(공급가)</span><span>'+et.toLocaleString()+'원</span></div></div>';
    }
    var ds2=ds,pn=r.projNum;
    html+='<div class="sbtn-wrap">';
    html+='<button class="sbtn sbtn-exp'+(expOk?' done':'')+'" id="sbtn-exp-'+i+'" onclick="doConfirm(\''+ds2+'\',\''+pn+'\',\'expense\','+expOk+')">'+(expOk?'✅ 경비확인완료':'💳 경비 확인')+'</button>';
    if(hasEq) html+='<button class="sbtn sbtn-eq'+(eqOk?' done':'')+'" id="sbtn-eq-'+i+'" onclick="doConfirm(\''+ds2+'\',\''+pn+'\',\'equip\','+eqOk+')">'+(eqOk?'✅ 장비결제완료':'🚜 장비 결제')+'</button>';
    html+='</div></div>';
  }
  document.getElementById('popup-body').innerHTML=html;
}

async function doConfirm(ds,pn,type,isDone){
  if(isDone&&!confirm('확인을 취소하시겠어요?'))return;
  showL('처리 중...');
  try{
    var t=type==='expense'?'confirmExpense':'confirmEquip';
    await postJ({type:t,date:ds,projNum:pn,value:isDone?'N':'Y',confirmTime:new Date().toLocaleString('ko-KR')});
    hideL();closePopup();loadCal();
  }catch(e){hideL();alert('오류가 발생했습니다.');}
}

function closePopup(){document.getElementById('popup').classList.remove('show');}

// ===== 미제출 =====
async function loadUnsub(){
  showL('미제출 현황 불러오는 중...');
  try{
    var res=await fetchJ(SURL+'?action=checkUnsubmitted');
    hideL();
    var el=document.getElementById('unsub-list');
    var d=res.data||[];
    if(d.length===0){el.innerHTML='<div class="empty">✅ 미제출 현장이 없어요!</div>';return;}
    var h='';
    d.forEach(function(r){
      h+='<div class="unsub-card"><div><div style="font-size:13px;font-weight:500">'+r.projName+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+r.date+' / '+r.receiver+'</div></div><div style="font-size:11px;color:#A32D2D;font-weight:500">'+r.diffDays+'일 경과</div></div>';
    });
    el.innerHTML=h;
  }catch(e){hideL();}
}

// ===== 현황 =====
function loadStat(){loadDateStat();loadMonthStat();}

async function loadDateStat(){
  var val=document.getElementById('stat-date').value;
  if(!val)return;
  var d=new Date(val+'T00:00:00');
  var ds=d.getFullYear()+'.'+pad2(d.getMonth()+1)+'.'+pad2(d.getDate());
  var el=document.getElementById('date-stat');
  el.innerHTML='<p style="font-size:12px;color:#888;padding:8px 0">불러오는 중...</p>';
  try{
    var res=await fetchJ(SURL+'?action=getRecordsByDate&date='+encodeURIComponent(ds));
    var data=res.data||[];
    if(data.length===0){el.innerHTML='<p style="font-size:13px;color:#888;padding:8px 0">'+ds+' 제출된 작업일보가 없어요</p>';return;}
    var h='';var tot=0;
    data.forEach(function(r){
      tot+=Number(r.totalAmt||0);
      h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #eee;font-size:12px"><span>'+r.projNum+' '+r.projName+'</span><span style="font-weight:500">'+Number(r.totalAmt||0).toLocaleString()+'원</span></div>';
    });
    h+='<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;font-weight:500;color:#1D9E75"><span>합계 ('+data.length+'개 현장)</span><span>'+tot.toLocaleString()+'원</span></div>';
    el.innerHTML=h;
  }catch(e){el.innerHTML='<p style="font-size:12px;color:#888">불러오지 못했어요</p>';}
}

async function loadMonthStat(){
  var val=document.getElementById('stat-month').value;
  if(!val)return;
  var parts=val.split('-');
  var ms=parts[0]+'.'+parts[1];
  var el=document.getElementById('month-stat');
  el.innerHTML='<p style="font-size:12px;color:#888;padding:8px 0">불러오는 중...</p>';
  try{
    var res=await fetchJ(SURL+'?action=getMonthTotal&month='+encodeURIComponent(ms));
    if(res.data){
      var d=res.data;
      el.innerHTML='<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span>법인카드</span><span>'+Number(d.corp||0).toLocaleString()+'원</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span>개인카드</span><span>'+Number(d.personal||0).toLocaleString()+'원</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span>장비/외주</span><span>'+Number(d.equip||0).toLocaleString()+'원</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px;font-weight:500;color:#1D9E75;border-top:0.5px solid #eee;margin-top:4px"><span>총 합계</span><span>'+Number(d.total||0).toLocaleString()+'원</span></div>';
    }
  }catch(e){el.innerHTML='<p style="font-size:12px;color:#888">불러오지 못했어요</p>';}
}

// ===== 대리작성 =====
function buildWrite(){
  document.getElementById('w-date').value=new Date().toISOString().split('T')[0];
  var ps=document.getElementById('w-proj');
  ps.innerHTML='<option value="">— 프로젝트 선택 —</option>';
  MD.projects.forEach(function(p){
    var o=document.createElement('option');
    o.value=p.biz+'|'+p.projNum+'|'+p.projName;
    o.textContent='['+p.biz+' '+p.projNum+'] '+p.projName;
    ps.appendChild(o);
  });
  var ww=document.getElementById('w-workers');ww.innerHTML='';
  MD.workers.forEach(function(w){
    var d=document.createElement('div');d.className='chip';d.textContent=w.name;
    d.onclick=function(){d.classList.toggle('on');};ww.appendChild(d);
  });
  var cw=document.getElementById('w-cards');cw.innerHTML='';
  MD.cards.forEach(function(c){
    var d=document.createElement('div');d.className='card-chip';
    d.textContent=c.cardCo+'('+c.last4+')';
    d.dataset.cardco=c.cardCo;d.dataset.last4=c.last4;d.dataset.biz=c.biz;d.dataset.personal='false';
    d.onclick=function(){document.querySelectorAll('#w-cards .card-chip').forEach(function(x){x.classList.remove('on');});d.classList.add('on');};
    cw.appendChild(d);
  });
  var pc=document.createElement('div');pc.className='card-chip';pc.textContent='개인카드';
  pc.dataset.cardco='개인';pc.dataset.last4='-';pc.dataset.biz='개인';pc.dataset.personal='true';
  pc.onclick=function(){document.querySelectorAll('#w-cards .card-chip').forEach(function(x){x.classList.remove('on');});pc.classList.add('on');};
  cw.appendChild(pc);
  mkTimes('w-ts',5,18,'07:00');mkTimes('w-te',5,18,'16:00');
  mkTimes('w-ots',15,24,'18:00');mkTimes('w-ote',15,24,'21:00');
}

function mkTimes(id,from,to,def){
  var s=document.getElementById(id);s.innerHTML='';
  for(var h=from;h<=to;h++){
    for(var m=0;m<60;m+=30){
      if(h===to&&m>0)break;
      var t=pad2(h)+':'+pad2(m);
      s.innerHTML+='<option>'+t+'</option>';
    }
  }
  s.value=def;
}

function addExp(){
  expC++;var id=expC;
  var ih=MD.expItems.map(function(i){return '<option>'+i+'</option>';}).join('');
  var div=document.createElement('div');div.className='item-box';div.id='ex-'+id;
  div.innerHTML='<button class="del-btn" onclick="document.getElementById(\'ex-'+id+'\').remove()">&#215;</button>'+
    '<div class="row2" style="margin-top:0">'+
    '<div><div class="lbl" style="margin-top:0">금액</div><input type="number" id="ea-'+id+'" placeholder="0" style="text-align:right"></div>'+
    '<div><div class="lbl" style="margin-top:0">항목</div><select id="ei-'+id+'"><option value="">선택</option>'+ih+'</select></div>'+
    '</div>';
  document.getElementById('w-exp-list').appendChild(div);
}

function addEq(){
  eqC++;var id=eqC;
  var eh=MD.equips.map(function(e){return '<div class="chip" style="font-size:11px" onclick="selEq(this,\''+id+'\')">'+e+'</div>';}).join('');
  var div=document.createElement('div');div.className='item-box';div.id='eq-'+id;
  div.innerHTML='<button class="del-btn" onclick="document.getElementById(\'eq-'+id+'\').remove()">&#215;</button>'+
    '<div class="chip-wrap" id="eqc-'+id+'" style="margin-top:0">'+eh+'</div>'+
    '<div class="row2" style="margin-top:8px">'+
    '<div><div class="lbl" style="margin-top:0">업체명</div><input type="text" id="eco-'+id+'" placeholder="업체명"></div>'+
    '<div><div class="lbl" style="margin-top:0">공급가액</div><input type="number" id="eam-'+id+'" placeholder="0" style="text-align:right" oninput="calcVat(\''+id+'\')"></div>'+
    '</div>'+
    '<div class="vat-box" id="evat-'+id+'">'+
    '<div class="vat-row"><span>공급가액</span><span id="es-'+id+'">0원</span></div>'+
    '<div class="vat-row"><span>부가세(10%)</span><span id="et-'+id+'">0원</span></div>'+
    '<div class="vat-row" style="font-weight:500;border-top:0.5px solid #ddd;margin-top:4px;padding-top:4px"><span>합계</span><span id="etot-'+id+'">0원</span></div>'+
    '</div>';
  document.getElementById('w-eq-list').appendChild(div);
}

function selEq(el,id){document.querySelectorAll('#eqc-'+id+' .chip').forEach(function(c){c.classList.remove('on');});el.classList.add('on');}
function calcVat(id){
  var s=parseInt(document.getElementById('eam-'+id).value)||0;
  var v=Math.round(s*0.1),tot=s+v;
  var box=document.getElementById('evat-'+id);
  if(s>0){box.style.display='block';document.getElementById('es-'+id).textContent=s.toLocaleString()+'원';document.getElementById('et-'+id).textContent=v.toLocaleString()+'원';document.getElementById('etot-'+id).textContent=tot.toLocaleString()+'원';}
  else box.style.display='none';
}

async function submitWrite(){
  var proj=document.getElementById('w-proj').value;
  var writer=document.getElementById('w-writer').value.trim();
  var dateVal=document.getElementById('w-date').value;
  if(!proj){alert('프로젝트를 선택해주세요.');return;}
  if(!writer){alert('작성자를 입력해주세요.');return;}
  var d=new Date(dateVal+'T00:00:00');
  var ds=d.getFullYear()+'.'+pad2(d.getMonth()+1)+'.'+pad2(d.getDate());
  var pp=proj.split('|');
  var ws=Array.from(document.querySelectorAll('#w-workers .chip.on')).map(function(c){return c.textContent;});
  var ex=document.getElementById('w-extra').value.trim();
  if(ex)ws=ws.concat(ex.split(',').map(function(s){return s.trim();}).filter(Boolean));
  var otChk=document.getElementById('w-ot').checked;
  var noExp=document.getElementById('w-noexp').checked;
  var cardEl=document.querySelector('#w-cards .card-chip.on');
  var expenses=[];
  document.querySelectorAll('.item-box[id^="ex-"]').forEach(function(box){
    var id=box.id.replace('ex-','');
    var amt=parseInt(document.getElementById('ea-'+id)?document.getElementById('ea-'+id).value:0)||0;
    var item=document.getElementById('ei-'+id)?document.getElementById('ei-'+id).value:'';
    if(amt>0&&cardEl)expenses.push({cardCo:cardEl.dataset.cardco,last4:cardEl.dataset.last4,biz:cardEl.dataset.biz,isPersonal:cardEl.dataset.personal==='true',userName:'',item:item,amount:amt});
  });
  var equips=[];
  document.querySelectorAll('.item-box[id^="eq-"]').forEach(function(box){
    var id=box.id.replace('eq-','');
    var typeEl=box.querySelector('.chip.on');
    var supply=parseInt(document.getElementById('eam-'+id)?document.getElementById('eam-'+id).value:0)||0;
    if(typeEl)equips.push({type:typeEl.textContent,company:document.getElementById('eco-'+id)?document.getElementById('eco-'+id).value:'',supplyAmt:supply,vatAmt:Math.round(supply*0.1),totalAmt:supply+Math.round(supply*0.1)});
  });
  var payload={type:'expense',date:ds,projNum:pp[1]||'',projName:pp[2]||'',projBiz:pp[0]||'',
    workers:ws.join(', '),workerCount:ws.length,
    timeStart:document.getElementById('w-ts').value,timeEnd:document.getElementById('w-te').value,
    overtime:otChk?(document.getElementById('w-ots').value+'~'+document.getElementById('w-ote').value):'',
    otWorkers:'',extraNote:'[관리자 대리작성]',
    expenses:expenses,equips:equips,noExpense:noExp,noInvoice:document.getElementById('w-noinv').checked,
    receiptCount:0,invoiceCount:0,writer:writer,submitTime:new Date().toLocaleString('ko-KR'),seq:1,isRevision:false};
  showL('저장 중...');
  try{
    await postJ(payload);
    hideL();
    document.getElementById('w-form').style.display='none';
    document.getElementById('w-done').classList.add('show');
    document.getElementById('w-done-desc').textContent=pp[2]+' / '+writer;
    loadCal();loadUnsub();
  }catch(e){hideL();alert('오류가 발생했습니다.');}
}

function resetWrite(){
  document.getElementById('w-done').classList.remove('show');
  document.getElementById('w-form').style.display='block';
  document.getElementById('w-proj').value='';
  document.querySelectorAll('#w-workers .chip.on').forEach(function(c){c.classList.remove('on');});
  document.querySelectorAll('#w-cards .card-chip.on').forEach(function(c){c.classList.remove('on');});
  document.getElementById('w-extra').value='';
  document.getElementById('w-exp-list').innerHTML='';
  document.getElementById('w-eq-list').innerHTML='';
  document.getElementById('w-ot').checked=false;
  document.getElementById('w-ot-wrap').style.display='none';
  document.getElementById('w-noexp').checked=false;
  document.getElementById('w-noinv').checked=false;
  document.getElementById('w-writer').value='';
  expC=0;eqC=0;
  mkTimes('w-ts',5,18,'07:00');mkTimes('w-te',5,18,'16:00');
  window.scrollTo(0,0);
}

init();
</script>
